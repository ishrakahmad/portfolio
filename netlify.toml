[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Prevent favicon caching so new icons show up immediately
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/favicon-32x32.png"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
